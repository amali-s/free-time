<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Background wash — warm parchment -->
  <rect width="400" height="280" rx="8" fill="#EDE6DE"/>

  <!-- Wall with window -->
  <rect x="230" y="20" width="120" height="90" rx="3" fill="#85CEDE" opacity="0.15"
        stroke="#595640" stroke-width="1"/>
  <line x1="290" y1="20" x2="290" y2="110" stroke="#595640" stroke-width="0.8" opacity="0.3"/>
  <!-- Curtain suggestion -->
  <path d="M232 22 Q240 35 235 50" stroke="#E8DDA2" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M348 22 Q340 35 345 50" stroke="#E8DDA2" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Desk surface -->
  <path d="M50 160 L350 160 L340 168 L60 168 Z" fill="#875C00" opacity="0.3"
        stroke="#595640" stroke-width="1.5"/>
  <!-- Desk front panel -->
  <rect x="60" y="168" width="280" height="55" rx="2" fill="#875C00" opacity="0.18"
        stroke="#595640" stroke-width="1"/>

  <!-- Laptop — center of desk -->
  <g transform="translate(155, 110)">
    <!-- Screen -->
    <rect x="0" y="0" width="70" height="45" rx="3" fill="#1B2323" opacity="0.8"
          stroke="#595640" stroke-width="1.5"/>
    <!-- Screen glow -->
    <rect x="4" y="4" width="62" height="37" rx="2" fill="#85CEDE" opacity="0.2"/>
    <!-- Text lines on screen -->
    <line x1="10" y1="14" x2="45" y2="14" stroke="#FFFDFB" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    <line x1="10" y1="22" x2="55" y2="22" stroke="#FFFDFB" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
    <line x1="10" y1="30" x2="38" y2="30" stroke="#FFFDFB" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
    <!-- Base/keyboard -->
    <path d="M-5 45 L75 45 L70 55 L0 55 Z" fill="#595640" opacity="0.3" stroke="#595640" stroke-width="1"/>
    <!-- Trackpad -->
    <rect x="25" y="47" width="20" height="5" rx="1" fill="#595640" opacity="0.15"/>
  </g>

  <!-- Coffee mug — left of laptop -->
  <g transform="translate(105, 135)">
    <rect x="0" y="5" width="22" height="20" rx="3" fill="#FFFDFB" stroke="#595640" stroke-width="1.2"/>
    <path d="M22 10 Q30 10 30 16 Q30 22 22 22" fill="none" stroke="#595640" stroke-width="1.2"/>
    <!-- Steam -->
    <path d="M8 3 Q7 -4 10 -8" stroke="#ADABA5" stroke-width="0.8" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M14 2 Q15 -5 12 -9" stroke="#ADABA5" stroke-width="0.8" fill="none" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Notepad — right of laptop -->
  <g transform="translate(260, 138)">
    <rect x="0" y="0" width="40" height="22" rx="2" fill="#FFFDFB" stroke="#595640" stroke-width="1" opacity="0.8"/>
    <line x1="6" y1="7" x2="34" y2="7" stroke="#ADABA5" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
    <line x1="6" y1="13" x2="28" y2="13" stroke="#ADABA5" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
    <!-- Pen -->
    <line x1="45" y1="2" x2="50" y2="22" stroke="#1E526F" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Desk lamp — far left -->
  <g transform="translate(65, 95)">
    <!-- Base -->
    <ellipse cx="12" cy="65" rx="14" ry="4" fill="#595640" opacity="0.25"/>
    <!-- Stem -->
    <line x1="12" y1="65" x2="12" y2="25" stroke="#595640" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Arm -->
    <line x1="12" y1="25" x2="35" y2="10" stroke="#595640" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Shade -->
    <path d="M25 5 L45 15 L30 18 Z" fill="#E8DDA2" opacity="0.5" stroke="#595640" stroke-width="1"/>
    <!-- Light cone -->
    <path d="M30 18 L20 60 L50 60 Z" fill="#E8DDA2" opacity="0.08"/>
  </g>

  <!-- Wall shelf with books — background detail -->
  <g transform="translate(60, 35)">
    <line x1="0" y1="55" x2="80" y2="55" stroke="#595640" stroke-width="1.5" opacity="0.3"/>
    <!-- Books -->
    <rect x="5" y="20" width="10" height="35" rx="1" fill="#1E526F" opacity="0.3"/>
    <rect x="17" y="25" width="8" height="30" rx="1" fill="#CC3926" opacity="0.2"/>
    <rect x="27" y="18" width="10" height="37" rx="1" fill="#BF9A49" opacity="0.3"/>
    <rect x="39" y="28" width="8" height="27" rx="1" fill="#096694" opacity="0.25"/>
    <rect x="49" y="22" width="10" height="33" rx="1" fill="#875C00" opacity="0.25"/>
  </g>

  <!-- Chair suggestion — foreground -->
  <g transform="translate(160, 215)">
    <rect x="0" y="0" width="60" height="8" rx="3" fill="#595640" opacity="0.15"/>
    <line x1="5" y1="8" x2="3" y2="40" stroke="#595640" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    <line x1="55" y1="8" x2="57" y2="40" stroke="#595640" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Warm afternoon light overlay -->
  <rect x="0" y="0" width="400" height="280" rx="8" fill="#E8DDA2" opacity="0.06"/>
</svg>

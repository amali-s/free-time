<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Background wash — warm parchment -->
  <rect width="400" height="280" rx="8" fill="#EDE6DE"/>

  <!-- Window frame — back wall -->
  <rect x="120" y="30" width="160" height="110" rx="4" fill="#85CEDE" opacity="0.2"
        stroke="#595640" stroke-width="1.5"/>
  <!-- Window panes -->
  <line x1="200" y1="30" x2="200" y2="140" stroke="#595640" stroke-width="1" opacity="0.4"/>
  <line x1="120" y1="85" x2="280" y2="85" stroke="#595640" stroke-width="1" opacity="0.4"/>
  <!-- Light through window -->
  <rect x="122" y="32" width="76" height="51" fill="#E8DDA2" opacity="0.15"/>

  <!-- Counter / bar surface -->
  <rect x="40" y="155" width="320" height="12" rx="2" fill="#875C00" opacity="0.35"
        stroke="#595640" stroke-width="1"/>

  <!-- Coffee cup — center -->
  <g transform="translate(175, 115)">
    <!-- Saucer -->
    <ellipse cx="25" cy="40" rx="22" ry="5" fill="#FFFDFB" stroke="#595640" stroke-width="1" opacity="0.8"/>
    <!-- Cup body -->
    <path d="M10 10 L8 35 Q8 40 15 40 L35 40 Q42 40 42 35 L40 10 Z"
          fill="#FFFDFB" stroke="#595640" stroke-width="1.5"/>
    <!-- Handle -->
    <path d="M42 18 Q55 18 55 27 Q55 36 42 36" fill="none" stroke="#595640" stroke-width="1.5"/>
    <!-- Coffee surface -->
    <ellipse cx="25" cy="13" rx="15" ry="4" fill="#875C00" opacity="0.4"/>
    <!-- Steam wisps -->
    <path d="M20 5 Q18 -5 22 -12" stroke="#ADABA5" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M28 3 Q30 -8 26 -15" stroke="#ADABA5" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M24 6 Q22 -2 25 -8" stroke="#ADABA5" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Pastry on plate — left side -->
  <g transform="translate(80, 135)">
    <ellipse cx="20" cy="20" rx="18" ry="4" fill="#FFFDFB" stroke="#595640" stroke-width="1" opacity="0.8"/>
    <path d="M8 16 Q12 4 20 3 Q28 4 32 16" fill="#E8DDA2" stroke="#595640" stroke-width="1" opacity="0.7"/>
    <!-- Sugar dusting -->
    <circle cx="15" cy="10" r="0.8" fill="#FFFDFB" opacity="0.6"/>
    <circle cx="22" cy="8" r="0.8" fill="#FFFDFB" opacity="0.6"/>
    <circle cx="18" cy="12" r="0.8" fill="#FFFDFB" opacity="0.6"/>
  </g>

  <!-- Small vase with flower — right side -->
  <g transform="translate(290, 118)">
    <!-- Vase -->
    <path d="M5 20 Q0 8 5 5 L15 5 Q20 8 15 20 Z" fill="#1E526F" opacity="0.4"
          stroke="#595640" stroke-width="1"/>
    <!-- Stem -->
    <line x1="10" y1="5" x2="10" y2="-10" stroke="#00803F" stroke-width="1" opacity="0.5"/>
    <!-- Flower -->
    <circle cx="10" cy="-14" r="5" fill="#CC3926" opacity="0.3"/>
    <circle cx="10" cy="-14" r="2" fill="#E8DDA2" opacity="0.5"/>
  </g>

  <!-- Wooden stool / seat suggestion — foreground left -->
  <g transform="translate(55, 175)">
    <ellipse cx="25" cy="5" rx="22" ry="6" fill="#875C00" opacity="0.25" stroke="#595640" stroke-width="1"/>
    <line x1="8" y1="10" x2="5" y2="55" stroke="#595640" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="42" y1="10" x2="45" y2="55" stroke="#595640" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Wooden stool — foreground right -->
  <g transform="translate(290, 175)">
    <ellipse cx="25" cy="5" rx="22" ry="6" fill="#875C00" opacity="0.25" stroke="#595640" stroke-width="1"/>
    <line x1="8" y1="10" x2="5" y2="55" stroke="#595640" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="42" y1="10" x2="45" y2="55" stroke="#595640" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Floor shadow -->
  <ellipse cx="200" cy="248" rx="150" ry="10" fill="#595640" opacity="0.04"/>

  <!-- Warm afternoon light overlay -->
  <rect x="0" y="0" width="400" height="280" rx="8" fill="#E8DDA2" opacity="0.06"/>
</svg>
